name: madad_app    
description: A new Flutter project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  url_launcher: ^6.3.0
  pdf: ^3.10.4
  printing: ^5.12.0
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  google_mlkit_image_labeling: ^0.10.0
  path_provider: ^2.1.2
  http: ^1.2.0
  google_generative_ai: ^0.4.5
  flutter_gemini: ^2.0.4  # تأكد من استخدام آخر إصدار
  firebase_core: ^2.30.0
  cloud_firestore: ^4.17.5
  flutter_riverpod: ^2.5.1
  cloud_functions: ^4.0.0
  firebase_auth: ^4.17.0
  
dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true



   # الصور
  assets:
    - assets/images/
    - assets/icon.png

  # الخطوط
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
